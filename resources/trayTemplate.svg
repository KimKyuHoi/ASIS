<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22" fill="none">
  <!--
    ASIS 트레이 아이콘 — ASIS 로고 그리드.

    macOS template image 컨벤션: 검은 픽셀 + alpha 만 사용한다.
    라이트/다크 모드는 macOS 가 자동으로 색을 반전한다.
  -->

  <!-- outer rounded border -->
  <rect x="1" y="1" width="20" height="20" rx="5" stroke="black" stroke-width="1.5"/>

  <!-- top-left — full -->
  <rect x="5" y="5" width="5" height="5" rx="1" fill="black"/>
  <!-- top-right — 60% -->
  <rect x="12" y="5" width="5" height="5" rx="1" fill="black" opacity="0.6"/>
  <!-- bottom-left — 60% -->
  <rect x="5" y="12" width="5" height="5" rx="1" fill="black" opacity="0.6"/>
  <!-- bottom-right — 30% -->
  <rect x="12" y="12" width="5" height="5" rx="1" fill="black" opacity="0.3"/>
</svg>
