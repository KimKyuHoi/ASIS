name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리즈할 태그 (예: v1.0.0) — 없으면 현재 커밋으로 빌드만 수행'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-mac:
    # macos-latest 로 빌드 (minimumSystemVersion 13.0은 electron-builder 설정으로 보장)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_dispatch에서 태그를 입력했으면 그 ref로 체크아웃
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Sync package.json version from tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if [ -n "$VERSION" ] && [ "$VERSION" != "$TAG" ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "package.json version set to $VERSION"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + main
        run: pnpm run build

      - name: Import signing certificate into keychain
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"

          # base64 인증서 → .p12 파일
          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

          # 임시 keychain 생성 및 잠금 해제
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 인증서 import — codesign / security 가 비밀번호 없이 접근 가능하도록 -T 설정
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -f pkcs12

          # keychain 검색 목록에 추가
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # codesign 이 keychain 에 비밀번호 프롬프트 없이 접근하도록 partition list 설정
          # ← 이 단계가 없으면 codesign 이 대화형 프롬프트를 기다리며 hang 한다
          security set-key-partition-list \
            -S "apple-tool:,apple:,codesign:" \
            -s -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Package macOS DMG (signed + notarized)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # CSC_LINK / CSC_KEY_PASSWORD 는 electron-builder 가 인증서를 식별하는 데 사용.
          # 앞 step 에서 keychain 에 set-key-partition-list 를 설정했으므로
          # codesign 이 비밀번호 프롬프트 없이 접근 가능 → hang 발생하지 않는다.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        # tag push면 GitHub Release에 publish, 수동 실행이면 아티팩트만 업로드
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "${{ github.event.inputs.tag }}" ]; then
            pnpm electron-builder --mac --publish never
          else
            pnpm electron-builder --mac --publish always
          fi

      - name: Update release notes from changelog
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # 이전 태그 찾기 (없으면 전체 커밋 사용)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            pnpm changelogen --from "$PREV_TAG" --to "$TAG" --output CHANGELOG_RELEASE.md
          else
            pnpm changelogen --to "$TAG" --output CHANGELOG_RELEASE.md
          fi
          gh release edit "$TAG" --notes-file CHANGELOG_RELEASE.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: |
            dist/*.dmg
            dist/latest-mac.yml
