name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리즈할 태그 (예: v1.0.0) — 없으면 현재 커밋으로 빌드만 수행'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-mac:
    # macos-latest 로 빌드 (minimumSystemVersion 13.0은 electron-builder 설정으로 보장)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # workflow_dispatch에서 태그를 입력했으면 그 ref로 체크아웃
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Sync package.json version from tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          if [ -n "$VERSION" ] && [ "$VERSION" != "$TAG" ]; then
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = '$VERSION';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "package.json version set to $VERSION"
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer + main
        run: pnpm run build

      - name: Package macOS PKG (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # tag push면 GitHub Release에 publish, 수동 실행이면 아티팩트만 업로드
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "${{ github.event.inputs.tag }}" ]; then
            pnpm electron-builder --mac --publish never
          else
            pnpm electron-builder --mac --publish always
          fi

      - name: Update release notes from changelog
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # 이전 태그 찾기 (없으면 전체 커밋 사용)
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            pnpm changelogen --from "$PREV_TAG" --to "$TAG" --output CHANGELOG_RELEASE.md
          else
            pnpm changelogen --to "$TAG" --output CHANGELOG_RELEASE.md
          fi
          gh release edit "$TAG" --notes-file CHANGELOG_RELEASE.md

      - name: Upload install.command to release
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$TAG" build/ASIS-installer.command --clobber

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-pkg
          path: dist/*.pkg
